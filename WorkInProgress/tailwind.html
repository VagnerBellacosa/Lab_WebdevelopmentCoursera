<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tailwind Responsive Layout</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

</head>

<body class="bg-gray-100 min-h-screen">

<header class="bg-red-600 text-white text-center p-5 text-2xl">
Header
</header>

<nav class="bg-blue-600 text-white p-4">

<ul class="flex flex-col md:flex-row justify-center gap-6 text-center">

<li>Home</li>
<li>Products</li>
<li>Services</li>
<li>Contact</li>

</ul>

</nav>

<div class="flex flex-col md:flex-row">

<aside class="bg-yellow-300 w-full md:w-1/4 p-5">

Aside

</aside>

<section class="bg-white flex-grow p-5">

<h2 class="text-xl font-bold mb-3">
Main Section
</h2>

<p>

Resize the browser window.

</p>

</section>

<article class="bg-green-300 w-full md:w-1/4 p-5">

Article

</article>

</div>

<footer class="bg-gray-900 text-white text-center p-5">

Footer

</footer>

</body>

</html>
