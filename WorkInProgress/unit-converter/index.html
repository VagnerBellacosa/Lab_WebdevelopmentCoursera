<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unit Converter Lab Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body id="home">
<header><h1>HTML5 Unit Converter</h1></header>
<nav>
<a href="#temperature">Temperature</a>
<a href="#weight">Weight</a>
<a href="#distance">Distance</a>
</nav>
<main>

<section id="temperature" class="card">
<figure><img src="https://cf-courses-data.s3.us.cloud-object-storage.appdomain.cloud/IBMDeveloperSkillsNetwork-CD0101EN-SkillsNetwork/labs/Theia%20Labs/02%20-%20HTML5%20Elements/images/thermo.png" width="120"><figcaption>Celsius → Fahrenheit</figcaption></figure>
<article>
<fieldset><legend>Temperature</legend>
<label>Celsius</label><input id="celsius" type="number">
<button onclick="convertTemp()">Convert</button>
<label>Fahrenheit</label><input id="fahrenheit" readonly>
</fieldset>
</article>
<aside>Formula: (C × 9/5)+32</aside>
</section>

<section id="weight" class="card">
<figure><figcaption>Weight</figcaption></figure>
<article><fieldset><legend>Weight</legend>
<label>Kilograms</label><input id="kg" type="number">
<button onclick="convertWeight()">Convert</button>
<label>Pounds</label><input id="lb" readonly>
</fieldset></article>
<aside>Formula: kg × 2.205</aside>
</section>

<section id="distance" class="card">
<figure><img src="https://cf-courses-data.s3.us.cloud-object-storage.appdomain.cloud/IBMDeveloperSkillsNetwork-CD0101EN-SkillsNetwork/labs/Theia%20Labs/02%20-%20HTML5%20Elements/images/speedo.png" width="120"><figcaption>Distance</figcaption></figure>
<article><fieldset><legend>Distance</legend>
<label>Kilometers</label><input id="km" type="number">
<button onclick="convertDistance()">Convert</button>
<label>Miles</label><input id="mi" readonly>
</fieldset></article>
<aside>Formula: km ÷ 1.609</aside>
</section>

<div id="go-home"><a href="#home">⬆ Home</a></div>
</main>
<footer>IBM Full Stack HTML5 Lab - Demo Project</footer>
<script src="script.js"></script>
</body>
</html>
